name: Build Tamma APK

on:
  push:
    branches: [main, master]
    paths:
      - 'tamma/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: tamma

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tamma/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Inline CDN assets (offline build)
        run: node --input-type=module < scripts/inline-assets.js

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT || true

      - name: Install Android build tools
        run: |
          sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Generate icon & splash sizes
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Gradle JVM args
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false"    >> android/gradle.properties
          echo "org.gradle.parallel=true"  >> android/gradle.properties
          echo "android.useAndroidX=true"  >> android/gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('tamma/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── DEBUG ──────────────────────────────────────────────────────────────
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release' && !startsWith(github.ref, 'refs/tags/')
        working-directory: tamma/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── RELEASE ────────────────────────────────────────────────────────────
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        working-directory: tamma/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/tamma-release.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/tamma-release.jks \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              --no-daemon --stacktrace
          else
            echo "⚠️  Keystore tidak ditemukan, build APK unsigned"
            ./gradlew assembleRelease --no-daemon --stacktrace
          fi

      # ── Rename & upload ────────────────────────────────────────────────────
      - name: Rename APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          VERSION=$(node -p "require('./package.json').version")
          TYPE=$([ "${{ github.event.inputs.build_type }}" = "release" ] && echo "release" || echo "debug")
          NAME="tamma-v${VERSION}-${TYPE}.apk"
          cp "$APK" "$NAME"
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "path=tamma/$NAME" >> $GITHUB_OUTPUT
          echo "✅ $NAME — $(du -h "$NAME" | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # ── GitHub Release (saat push tag) ─────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          body: |
            ## Tamma ${{ github.ref_name }}

            Unduh APK di bawah dan instal di perangkat Android.

            > ⚠️ Aktifkan **"Install from unknown sources"** sebelum menginstal.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tamma/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Inline all CDN assets (offline build)
        run: node --experimental-vm-modules scripts/inline-assets.js

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            --sdk_root=$ANDROID_SDK_ROOT
          yes | sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT || true

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Generate all Android icon & splash sizes
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Gradle JVM args
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('tamma/android/**/*.gradle*', 'tamma/android/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        working-directory: tamma/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        working-directory: tamma/android
        env:
          KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:   ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/tamma-release.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/tamma-release.jks \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              --no-daemon --stacktrace
          else
            echo "⚠️  No keystore, building unsigned release APK"
            ./gradlew assembleRelease --no-daemon --stacktrace
          fi

      - name: Locate and rename APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          VERSION=$(node -p "require('./package.json').version")
          TYPE=$([ "${{ github.event.inputs.build_type }}" = "release" ] && echo "release" || echo "debug")
          NEW_NAME="tamma-v${VERSION}-${TYPE}.apk"
          cp "$APK" "$NEW_NAME"
          echo "final_name=tamma/$NEW_NAME" >> $GITHUB_OUTPUT
          echo "✅ APK: $NEW_NAME ($(du -h "$NEW_NAME" | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.final_name }}
          path: ${{ steps.apk.outputs.final_name }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.final_name }}
          generate_release_notes: true
          body: |
            ## Tamma ${{ github.ref_name }}
            
            Unduh APK di bawah dan instal di perangkat Android.
            
            > ⚠️ Aktifkan **"Install from unknown sources"** sebelum menginstal.
